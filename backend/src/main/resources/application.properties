spring.application.name=backend
spring.jpa.open-in-view=false

# =========================
# BASE DE DATOS
# =========================
spring.datasource.url=${DB_URL:jdbc:mariadb://localhost:3306/piscinas_db}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

# =========================
# JPA (Hibernate)
# =========================
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# =========================
# FLYWAY
# =========================
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# =========================
# SERVER
# =========================
server.port=${SERVER_PORT:8080}

# =========================
# MULTIPART (subida de ficheros)
# =========================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
server.tomcat.max-swallow-size=10MB
server.tomcat.max-http-form-post-size=10MB

# =========================
# JWT
# =========================
app.jwt.secret=${JWT_SECRET:mi_clave_secreta_super_segura_123456_mas_larga_para_hs256}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:3600000}

# =========================
# CORS (orígenes permitidos separados por coma)
# =========================
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}
